services:
  - type: web
    name: model-arena-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    port: 8000
    env:
      - key: OPENROUTER_API_KEY
        fromDatabase:
          name: model-arena
          property: OPENROUTER_API_KEY
    healthCheckPath: /api/health
    healthCheckInterval: 30
    
  - type: web
    name: model-arena-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    port: 80
    env:
      - key: BACKEND_URL
        value: model-arena-backend.onrender.com
    depends_on:
      - model-arena-backend
    healthCheckPath: /
    healthCheckInterval: 30
